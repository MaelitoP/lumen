[package]
name = "lumen-cluster"
version = "0.1.0"
edition = "2021"
rust-version.workspace = true

[dependencies]
lumen-proto = { path = "../proto", features = ["grpc"] }
openraft = { version = "0.9.24", features = ["storage-v2"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }
